<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #brojac {
            position: fixed;
            right: 10px;
            bottom: 8px;
            z-index: 1;
            padding: 5px 8px;
            border-radius: 5px;
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            font: 600 clamp(11px, 2.2vw, 15px) "Courier New", monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px #000;
        }
    </style>
</head>
<body>

    <img src="meda.jpg" alt="Meda">

    <div id="brojac">0d 00:00:00</div>

    <script>
        const pocetak = new Date("2025-10-06T10:00:00+02:00").getTime();
        const brojac = document.getElementById("brojac");

        function osvjeziBrojac() {
            const ukupnoSekundi = Math.max(0, Math.floor((Date.now() - pocetak) / 1000));
            const dani = Math.floor(ukupnoSekundi / 86400);
            const sati = Math.floor((ukupnoSekundi % 86400) / 3600);
            const minute = Math.floor((ukupnoSekundi % 3600) / 60);
            const sekunde = ukupnoSekundi % 60;

            brojac.textContent =
                `${dani}d ` +
                `${String(sati).padStart(2, "0")}:` +
                `${String(minute).padStart(2, "0")}:` +
                `${String(sekunde).padStart(2, "0")}`;
        }

        osvjeziBrojac();
        setInterval(osvjeziBrojac, 1000);
    </script>

</body>
</html>
